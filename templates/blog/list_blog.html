{% block blog %}

    {% for blog in blogs %}
        <article>
            <h3> {{ blog.name }} </h3>
            <img src="{{ blog.image }}"></img>
            <p> {{ blog.preview }} </p>
            <p> {{ blog.created_at }} </p>
            <a href="{% url 'blog:blog_detail' blog.pk %}">Ver Mas</a>
        </article>
    {% endfor %}

{% endblock %}
