{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Akronim&family=GFS+Didot&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'home/css/style.css' %}">

{% block blog %}

    {% for blog in blogs %}
        <article>
            <h3> {{ blog.name }} </h3>
            <img src="{{ blog.image }}"></img>
            <p> {{ blog.preview }} </p>
            <p> {{ blog.created_at }} </p>
            <button> <a href="{% url 'blog:blog_detail' blog.pk %}"> VER MAS </a> </button>
        </article>
    {% endfor %}

{% endblock %}
