<h3> Blog sobre Cafe </h3>

<section>
    {% for blog in blogs %}
        <article class="blog">
            <img src="{{ blog.image.url }}" width="300">
            <h3> {{ blog.name }} </h3>
            <p> {{ blog.preview }} </p>
            <p> {{ blog.created_at }} </p>
            <button class="content-blog"> <a href="{% url 'blog:blog_detail' blog.pk %}"> VER MAS </a> </button>
        </article>
    {% endfor %}
</section>
