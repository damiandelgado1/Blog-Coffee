<select>
    {% for blog in blogs %}
        <option> {{blog.category}} </option>
    {% endfor %}
</select>

<a href="{% url 'blog:create_blog' %}"> Crear Nuevo Blog </a>

{% block blog %}

    {% for blog in blogs %}
        <article>
            <h3> {{ blog.name }} </h3>
            <img src="{{ blog.image }}"></img>
            <p> {{ blog.created_at }} </p>
            <a href="{% url 'blog:blog_detail' blog.pk %}">Ver Mas</a>
        </article>
    {% endfor %}

{% endblock %}
