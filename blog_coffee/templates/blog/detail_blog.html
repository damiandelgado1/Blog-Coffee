{% extends 'home/layout.html' %}

{% block title %} {{ blog.name }} {% endblock %}

{% block content %}

    <article>
        <img href="{{ blog.image }}"></img>
        <br>
        <h3> {{blog.name}} </h3>
        <p> {{blog.category}} </p>
        <p> {{blog.description}} </p>
        <p> Fecha de Publicacion: {{blog.created_at}} </p>
        <a href="{% url 'blog:blog_list' %}">Volver al Inicio</a>
    </article>

{% endblock %}
