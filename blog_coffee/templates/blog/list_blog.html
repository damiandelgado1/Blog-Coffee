{% extends 'home/layout.html' %}

{% block title %} Blogs sobre Cafe {% endblock %}

{% block content %}

    <select>
        <option> {{blog.category}} </option>
    </select>

    {% for blog in blogs %}
        <article>
            <h3> {{ blog.name }} </h3>
            <img> {{ blog.image }} </img>
            <p> {{ blog.created_at }} </p>
            <a href="{% url 'blog:detail_blog' blog.pk %}">Ver Mas</a>
        </article>
    {% endfor %}

{% endblock %}
